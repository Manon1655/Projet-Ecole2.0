services:
  mysql:
    image: mysql:8.0
    container_name: projetecole_mysql
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASS}
      - DB_NAME=${DB_NAME}
    ports: ['8080:8080']
    extra_hosts:
      - 'host.docker.internal:host-gateway'
  frontend:
    build: .
    container_name: projetecole_frontend
    ports: ['80:80']
    depends_on: [backend]
